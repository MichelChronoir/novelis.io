<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novellix AI | Penulis Masa Depan</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <div id="login-screen" class="overlay">
            <div class="glass-card login-box">
                <h2 class="neon-text">Novellix AI</h2>
                <p>Masuk untuk mengakses proyek novel Anda</p>
                <form id="login-form">
                    <input type="email" id="user-email" placeholder="Email (bebas untuk demo)" required>
                    <input type="password" id="user-pass" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Masuk & Mulai Menulis</button>
                    <p class="foot-note">Sistem otomatis menyimpan data di browser Anda.</p>
                </form>
            </div>
        </div>

        <main id="workspace" class="hidden">
            <nav class="sidebar glass">
                <div class="logo-area"><h3 class="neon-text">NX</h3></div>
                <div class="nav-links">
                    <button onclick="newProject()" title="Proyek Baru"><i data-lucide="plus-circle"></i></button>
                    <button onclick="toggleSidebar('chapters')" title="Chapters"><i data-lucide="book-open"></i></button>
                    <button onclick="toggleSidebar('memory')" title="Memory Bank"><i data-lucide="brain-circuit"></i></button>
                    <button onclick="exportDoc()" title="Export PDF/TXT"><i data-lucide="download"></i></button>
                </div>
                <button class="settings-btn" onclick="logout()"><i data-lucide="log-out"></i></button>
            </nav>

            <section class="editor-container">
                <header class="editor-header glass">
                    <input type="text" id="chapter-title" placeholder="Judul Chapter..." value="Chapter 1: Awal Mula">
                    <div class="stats">Kata: <span id="word-count">0</span> | Karakter: <span id="char-count">0</span></div>
                </header>
                <textarea id="main-editor" placeholder="Tuliskan baris pertama novelmu di sini..."></textarea>
                
                <div id="ai-assistant" class="glass hidden">
                    <div class="ai-avatar">🤖</div>
                    <div id="ai-feedback">Menunggu input...</div>
                </div>
            </section>

            <aside class="ai-panel glass">
                <div class="ai-header">
                    <i data-lucide="sparkles"></i> <span>AI Ghostwriter</span>
                </div>
                
                <div class="ai-controls">
                    <label>Sudut Pandang (POV)</label>
                    <select id="pov-select">
                        <option value="pov1">Orang Pertama (Aku)</option>
                        <option value="pov3">Orang Ketiga (Dia/Nama)</option>
                        <option value="mix">POV Campuran (AI Otomatis)</option>
                    </select>

                    <div class="action-buttons">
                        <button class="btn-ai" onclick="runAIAction('generate')">Generate Chapter</button>
                        <button class="btn-outline" onclick="runAIAction('improve')">Perhalus Gaya Bahasa</button>
                        <button class="btn-outline" onclick="runAIAction('rewrite')">Rewrite Scene</button>
                    </div>
                </div>

                <div class="memory-peek glass">
                    <h4>Memory Database</h4>
                    <div id="memory-list" class="scrollable">
                        <div class="memory-item"><b>Tokoh:</b> Belum ada data</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
