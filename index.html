<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Novel Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="glass box">
    <h1>AI Novel Studio</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <header>
    <h2>📚 Proyek Novel</h2>
    <button onclick="createProject()">+ Proyek Baru</button>
  </header>
  <div id="projectList"></div>
</div>

<!-- WORKSPACE -->
<div id="workspace" class="hidden">
  <aside>
    <h3>Chapters</h3>
    <ul id="chapters"></ul>
  </aside>

  <main>
    <textarea id="editor" placeholder="Mulai menulis..."></textarea>
  </main>

  <section class="ai-panel">
    <h3>AI Tools</h3>
    <button onclick="generateAI()">Generate Chapter</button>
    <button onclick="improveText()">Improve Writing</button>
    <button onclick="rewriteText()">Rewrite Scene</button>

    <select id="pov">
      <option>POV 1</option>
      <option>POV 2</option>
      <option>POV 3</option>
      <option>POV Mix</option>
    </select>
  </section>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
