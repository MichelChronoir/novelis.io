<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Novel Writer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>AI Novel Writer</h1>

    <div class="controls">
      <input id="title" placeholder="Judul Novel">
      <select id="pov">
        <option value="1">POV 1</option>
        <option value="2">POV 2</option>
        <option value="3">POV 3</option>
        <option value="mix">POV 1 + 3</option>
      </select>

      <label><input type="checkbox" id="openai" checked> OpenAI</label>
      <label><input type="checkbox" id="claude"> Claude</label>
      <label><input type="checkbox" id="gemini"> Gemini</label>

      <button onclick="generateChapter()">Generate Bab</button>
      <button onclick="editText()">AI Edit</button>
      <button onclick="saveData()">Save</button>
      <button onclick="loadData()">Load</button>
    </div>

    <textarea id="editor" placeholder="Tulis atau generate novel di sini..."></textarea>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
