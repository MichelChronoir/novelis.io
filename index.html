<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Novel Writer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <h1>✍️ AI Novel Writer</h1>

    <div class="top-bar">
      <input id="title" placeholder="Judul Novel...">

      <select id="pov">
        <option value="1">POV 1</option>
        <option value="2">POV 2</option>
        <option value="3">POV 3</option>
        <option value="mix">POV 1 + 3</option>
      </select>
    </div>

    <div class="ai-options">
      <label><input type="checkbox" id="openai" checked> OpenAI</label>
      <label><input type="checkbox" id="claude"> Claude</label>
      <label><input type="checkbox" id="gemini"> Gemini</label>
    </div>

    <div class="buttons">
      <button onclick="generateText()">Generate</button>
      <button onclick="editText()">AI Edit</button>
      <button onclick="saveData()">Save</button>
      <button onclick="loadData()">Load</button>
    </div>

    <textarea id="editor" placeholder="Mulai menulis atau generate cerita..."></textarea>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
